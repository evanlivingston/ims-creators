services:
  ims-creators:
    build:
      context: ..
      dockerfile: web/Dockerfile
    ports:
      - "8080:3000"
    volumes:
      - ${PROJECT_PATH:?Set PROJECT_PATH to your design data directory}:/data/design
      - ~/.config/gh:/root/.config/gh:ro
    environment:
      - PROJECT_PATH=/data/design
      - API_KEY=${API_KEY:-}
      - PORT=3000
      - GIT_DISCOVERY_ACROSS_FILESYSTEM=1
    restart: unless-stopped
