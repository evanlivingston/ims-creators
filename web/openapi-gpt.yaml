openapi: 3.1.0
info:
  title: If This - Game Design API
  description: >
    Simplified API for managing game design data for "If This",
    a game set in a fictional concentration camp.
    IMPORTANT: Always call getContext first to learn the project structure.
    Use plain names for references (e.g. "Emorian" not a UUID).
  version: 2.0.0
servers:
  - url: https://ims.sieisst.com
security:
  - apiKey: []
components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: x-api-key

paths:
  /api/gpt/context:
    get:
      operationId: getContext
      summary: Get project overview, entity types, valid values. Call this first.
      x-openai-isConsequential: false
      responses:
        "200":
          description: Project context with all entity types and reference data
          content:
            application/json:
              schema:
                type: object
                properties:
                  game:
                    type: string
                  description:
                    type: string
                  entityTypes:
                    type: object
                  referenceData:
                    type: object

  /api/gpt/characters:
    get:
      operationId: listCharacters
      summary: List all characters (id, title, icon)
      x-openai-isConsequential: false
      responses:
        "200":
          description: Array of characters
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    title:
                      type: string
    post:
      operationId: createCharacter
      summary: Create a new character
      x-openai-isConsequential: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  description: Character name
                description:
                  type: string
                  description: Character backstory or bio
                name:
                  type: string
                  description: Character's in-game display name
                age:
                  type: string
                  description: "Character age (e.g. '25' or '30 years old')"
                health:
                  type: integer
                  description: Hit points
                damage:
                  type: integer
                  description: Base damage
                language:
                  type: string
                  description: "Primary language by name. Valid: Emorian, Kalpin, Surrk, Gundr, Saifre, Renel, Delkam, Vákilie, Edsch, Pământi, Korsδ, Lagertongue"
                country:
                  type: string
                  description: "Country of origin by name. Valid: United Emor, Kingdom of Kalpand, Empire of Surrky, Holy Gundria, Saifra, Republic of Delkamy, Vákilnia, Edschterr, Northern Korsé, Mulbian"
                occupation:
                  type: string
                  description: "Character occupation (e.g. doctor, laborer, teacher)"
                personality:
                  type: string
                  description: Personality traits
                weight:
                  type: number
                  description: Weight in kg
      responses:
        "200":
          description: Created character
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string

  /api/gpt/characters/{id}:
    get:
      operationId: getCharacter
      summary: Get a character's full details
      x-openai-isConsequential: false
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Character ID (UUID)
      responses:
        "200":
          description: Character details as flat key-value pairs
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
    put:
      operationId: updateCharacter
      summary: Update a character's properties. Only send fields you want to change.
      x-openai-isConsequential: true
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                name:
                  type: string
                age:
                  type: string
                health:
                  type: integer
                damage:
                  type: integer
                language:
                  type: string
                  description: "Use language name, not UUID"
                country:
                  type: string
                  description: "Use country name, not UUID"
                occupation:
                  type: string
                personality:
                  type: string
                weight:
                  type: number
      responses:
        "200":
          description: Updated character
          content:
            application/json:
              schema:
                type: object
    delete:
      operationId: deleteCharacter
      summary: Delete a character
      x-openai-isConsequential: true
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /api/gpt/items:
    get:
      operationId: listItems
      summary: List all items
      x-openai-isConsequential: false
