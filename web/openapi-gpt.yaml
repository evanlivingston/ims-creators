                description:
                  type: string
                  description: Item description
                type:
                  type: string
                  description: "Item category. Valid: food, tool, clothing, valuable, chore"
                price:
                  type: integer
                  description: Trade value
                effect:
                  type: string
                  description: "Effect by name. Valid: Heal, Frozen, Ignited, Poisoned, Stun, Scared, Ice Armor, War Cry"
                effect_value:
                  type: number
                  description: Effect strength
                effect_duration:
                  type: number
                  description: Effect duration in seconds
      responses:
        "200":
          description: Created item
          content:
            application/json:
              schema:
                type: object

  /api/gpt/items/{id}:
    get:
      operationId: getItem
